apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: trading-watchlist
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  POLYGON_API_KEY: {{ .Values.secrets.polygonApiKey | quote }}
  ALPHA_VANTAGE_API_KEY: {{ .Values.secrets.alphaVantageApiKey | quote }}
  FINNHUB_API_KEY: {{ .Values.secrets.finnhubApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  DATABASE_URL: {{ printf "postgres://watchlist:%s@%s-postgresql:5432/watchlist?sslmode=disable" .Values.postgresql.auth.password .Release.Name | quote }}
  REDIS_URL: {{ printf "redis://%s-redis-master:6379" .Release.Name | quote }}
